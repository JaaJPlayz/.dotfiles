general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = screenshot
    blur_passes = 4 
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = Hello, $USER!<br/>
    color = rgb(ffffff)
    font_size = 21
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}

