input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    rounding = 18
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgb($color1)
    inner_color = rgb($color2)
    font_color = rgb($color1)
    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>
    check_color = rgb($color3)
    fail_color = rgb($color4)
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:0] date "+%A %B %d, %H:%M"
    color = rgb($color0)
    font_family = VictorMono NF Bold
    font_size = 20
    position = -60, 0
    halign = right
    valign = bottom
}
